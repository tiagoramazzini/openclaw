<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — OpenClaw Command Center</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .chat-layout { display: flex; height: calc(100vh - 0px); overflow: hidden; }
    .chat-sidebar { width: 260px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--card); flex-shrink: 0; }
    .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-toolbar { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: var(--card); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; }
    .chat-input-bar { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; background: var(--card); }
    .chat-input-bar textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; color: var(--text); font-family: var(--font); font-size: 13.5px; resize: none; outline: none; min-height: 44px; max-height: 120px; line-height: 1.5; transition: border-color .18s; }
    .chat-input-bar textarea:focus { border-color: var(--primary); }
    .bubble-row { display: flex; gap: 10px; align-items: flex-start; }
    .bubble-row.user  { flex-direction: row-reverse; }
    .bubble-row.user .bubble { background: var(--primary); color: #fff; border-radius: 18px 18px 4px 18px; }
    .bubble-row.assistant .bubble { background: var(--card2); border-radius: 18px 18px 18px 4px; }
    .bubble { padding: 10px 14px; font-size: 13.5px; line-height: 1.6; max-width: 72%; white-space: pre-wrap; word-break: break-word; }
    .bubble-meta { font-size: 10.5px; color: var(--muted); margin-top: 4px; text-align: right; }
    .bubble-row.user .bubble-meta { text-align: right; }
    .bubble-row.assistant .bubble-meta { text-align: left; }
    .bubble-cost { display: inline-flex; align-items: center; gap: 4px; background: rgba(247,127,0,0.12); color: var(--alert); border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: 600; margin-left: 6px; }
    .session-item { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
    .session-item:hover, .session-item.active { background: rgba(0,180,216,0.08); }
    .session-item-title { font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-item-meta  { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
    .typing-indicator { display: flex; gap: 4px; padding: 12px 14px; }
    .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: typing 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    .chat-sidebar-header { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .session-list { flex: 1; overflow-y: auto; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🦀</div>
      <div><span>OpenClaw</span><small>Command Center</small></div>
    </div>
    <div style="padding:8px 12px;border-bottom:1px solid var(--border)">
      <select id="workspace-selector" class="form-control" style="font-size:12px;padding:5px 8px"></select>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="gateway-badge">
        <span class="status-dot" id="sidebar-status-dot"></span>
        <span id="sidebar-status-text">Verificando…</span>
      </div>
    </div>
  </aside>

  <main class="main" style="overflow:hidden">
    <div class="gateway-banner" id="gateway-banner">
      ⚠️ Gateway OpenClaw está offline — verifique a conexão em Configurações
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0">
      <div>
        <h1 style="font-size:20px;font-weight:700">Chat</h1>
        <p style="font-size:12px;color:var(--muted);margin-top:2px">Converse diretamente com um agente OpenClaw</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div id="alert-bell" style="position:relative;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--card);border:1px solid var(--border)">
          🔔
          <span id="alert-bell-badge" style="position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;display:none;align-items:center;justify-content:center;font-weight:700"></span>
        </div>
        <div id="alert-dropdown" style="display:none;position:absolute;top:60px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:10px;width:280px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,0.4)"></div>
      </div>
    </div>

    <div class="chat-layout">
      <!-- Sessions sidebar -->
      <div class="chat-sidebar">
        <div class="chat-sidebar-header">
          <span style="font-size:12px;font-weight:600;color:var(--muted)">SESSÕES</span>
          <button class="btn btn-primary btn-sm" id="btn-new-chat">+ Nova</button>
        </div>
        <div class="session-list" id="session-list">
          <div class="loader" style="padding:24px"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Chat main -->
      <div class="chat-main">
        <div class="chat-toolbar">
          <div style="flex:1;min-width:140px">
            <label class="form-label" style="margin-bottom:3px">Agente</label>
            <input type="text" class="form-control" id="chat-agent" placeholder="ID do agente (opcional)" style="padding:6px 10px;font-size:12.5px">
          </div>
          <div style="min-width:180px">
            <label class="form-label" style="margin-bottom:3px">Modelo LLM</label>
            <select class="form-control" id="chat-model" style="padding:6px 10px;font-size:12.5px"></select>
          </div>
        </div>

        <div class="chat-messages" id="chat-messages">
          <div class="empty-state" id="chat-empty">
            <div class="empty-icon">💬</div>
            <p>Inicie uma conversa com um agente OpenClaw</p>
          </div>
        </div>

        <div class="chat-input-bar">
          <textarea id="chat-input" placeholder="Digite sua mensagem… (Ctrl+Enter para enviar)" rows="1"></textarea>
          <button class="btn btn-primary" id="btn-send" style="height:44px;padding:0 18px">Enviar</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/static/js/shared.js"></script>
<script src="/static/js/chat.js"></script>
</body>
</html>
